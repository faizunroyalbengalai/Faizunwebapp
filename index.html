<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>faizunwebapp</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      animation: twinkle 4s infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: 0.1; }
      100% { opacity: 0.6; }
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 2rem 1rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.6rem;
      box-shadow: 0 0 12px rgba(46, 160, 67, 0.45);
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 40px rgba(0, 0, 0, 0.6),
        0 0 60px rgba(88, 166, 255, 0.06);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.6rem;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(56, 139, 253, 0.4);
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: #ffffff;
    }

    h1.project-name {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #58a6ff, #a5d6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #1f6feb, #388bfd);
      border-radius: 999px;
      margin: 1.2rem auto;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.85rem 1.4rem;
      margin-top: 1.2rem;
      transition: border-color 0.25s;
    }

    .info-row:hover {
      border-color: #388bfd;
    }

    .info-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      white-space: nowrap;
    }

    .info-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
      word-break: break-all;
    }

    .info-row svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      fill: #388bfd;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: #30363d;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cta {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      padding: 0.75rem 1.8rem;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(56, 139, 253, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(56, 139, 253, 0.5);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }

    footer {
      position: relative;
      z-index: 1;
      width: 100%;
      text-align: center;
      padding: 1.4rem 1rem;
      border-top: 1px solid #21262d;
      color: #8b949e;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }

    footer span {
      color: #58a6ff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Starfield -->
  <div class="stars" id="stars"></div>

  <main>
    <div class="badge">&#x2728; Live Project</div>

    <div class="card">
      <div class="icon-wrap">
        <!-- Code / App icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
        </svg>
      </div>

      <h1 class="project-name">faizunwebapp</h1>
      <p style="color:#8b949e; font-size:0.9rem; margin-top:0.3rem;">A modern web application project</p>

      <div class="divider"></div>

      <!-- Project Name Row -->
      <div class="info-row">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14.93V15a1 1 0 0 0-2 0v1.93A8 8 0 0 1 4.07 11H6a1 1 0 0 0 0-2H4.07A8 8 0 0 1 11 4.07V6a1 1 0 0 0 2 0V4.07A8 8 0 0 1 19.93 11H18a1 1 0 0 0 0 2h1.93A8 8 0 0 1 13 16.93z"/>
        </svg>
        <span class="info-label">Project</span>
        <div class="dot"></div>
        <span class="info-value">faizunwebapp</span>
      </div>

      <!-- Repo Row -->
      <div class="info-row">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        <span class="info-label">Repo</span>
        <div class="dot"></div>
        <span class="info-value">Faizunwebapp</span>
      </div>

      <a class="cta" href="https://github.com/Faizunwebapp" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        View on GitHub
      </a>
    </div>
  </main>

  <footer>
    Developed by <span>Royal Bengal AI</span>
  </footer>

  <script>
    // Generate random stars
    const container = document.getElementById('stars');
    const count = 120;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      const size = Math.random() * 2.4 + 0.6;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        animation-delay: ${Math.random() * 4}s;
        animation-duration: ${2.5 + Math.random() * 4}s;
        opacity: ${Math.random() * 0.5 + 0.1};
      `;
      container.appendChild(star);
    }
  </script>
</body>
</html>
